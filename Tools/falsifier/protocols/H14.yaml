# HELIOS V5 W25 — M2 Max falsifier protocol for H14 Apollonian Local-Global Conjecture FALSE.
#
# Per docs/HELIOS_V5_DOC_6_THEOREM_CANON.md §2 H14 +
# Haag-Kertzer-Rickards-Stange Annals of Mathematics 200(2):749-770
# (2024).
#
# Statement: the 20-year-old Local-Global Conjecture for Apollonian
# packings is FALSE. Quadratic and quartic obstructions prevent
# certain residue classes from appearing as curvatures in any
# primitive integer Apollonian packing.
#
# This is a mathematical fact, not an engineering claim. The
# falsifier role is to ENSURE we never accidentally claim or rely
# on the (false) conjecture in any HELIOS V5 substrate. The
# audit is a documentation + citation discipline, not a runtime
# check.

id: H14
title: "Apollonian Local-Global Conjecture is FALSE (Haag-Kertzer-Rickards-Stange 2024)"
class: operational
lane: L3
severity: HALT
state: implemented

statement: |
  The 20-year-old Local-Global Conjecture for Apollonian
  packings is FALSE. Per Haag-Kertzer-Rickards-Stange Annals
  200(2):749-770 (2024): quadratic and quartic obstructions
  prevent certain residue classes (mod 24 and mod 48) from
  appearing as curvatures in any primitive integer Apollonian
  packing, regardless of how many packings are sampled.

acceptance:
  metric: false_conjecture_witness_present
  threshold: 1.0             # canonical falsifier-witness must be cited everywhere relevant
  units: fraction

stage_0_proxy:
  # H14 is a NEGATIVE-knowledge invariant: ensure no HELIOS
  # substrate accidentally relies on the (false) conjecture.
  # The grep gate runs at CI time; absence of "Apollonian local-
  # global" claims-as-true is the proxy.
  shell_proxy: |
    ! grep -rEn 'Apollonian.+Local.{0,5}Global.+(holds|true|conjecture[^=]*$)' \
      docs/ agent_core/src/ epistemos-research/src/ epistemos-vault/src/ \
      Epistemos/ EpistemosTests/ 2>/dev/null | grep -vE '(FALSE|H14|2024|Annals|200.*749)'
  expected_exit: 0

m2_max_protocol:
  hardware: M2 Max
  procedure: |
    1. CI grep gate: ensure no source file claims the conjecture
       holds without the explicit "FALSE" disambiguation or the
       Haag-Kertzer-Rickards-Stange 2024 citation.
    2. Documentation audit: every reference to Apollonian packings
       must include the canonical citation
       "Annals 200(2):749-770 (2024)".

falsifier:
  hard: |
    Any uncited claim that the Apollonian Local-Global Conjecture
    holds is a HALT-class violation per H14. The falsifier is the
    Annals 200(2):749-770 (2024) paper itself — Haag-Kertzer-
    Rickards-Stange constructively exhibit residue classes that
    can NEVER appear as curvatures.
  meta: |
    H14 is unusual: it is a negative-knowledge invariant. We do
    not ship code that depends on the conjecture; we ship code
    that knows the conjecture is false and cites it correctly.

cross_refs:
  - docs/HELIOS_V5_DOC_6_THEOREM_CANON.md §2 H14
  - lean/Epistemos/Epistemos/H14.lean
  - Annals of Mathematics 200(2):749-770 (2024)

insertion_site: documentation only — no executable substrate
