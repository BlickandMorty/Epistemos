name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Patch 9: Mac App Store bundle-size gate. Tunable without code edits.
  # Hard ceiling for total Epistemos.app size (App Store variant) in megabytes.
  # Warning annotation emitted at 80% of this value.
  EPISTEMOS_APPSTORE_BUNDLE_SIZE_LIMIT_MB: 600

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            graph-engine -> target
            epistemos-core -> target
            omega-ax -> target
            omega-mcp -> target
            agent_core -> target
          cache-on-failure: true

      # Build Rust crates in dependency order
      - name: Build graph-engine (static lib, C FFI)
        run: cd graph-engine && cargo build --target aarch64-apple-darwin --release

      - name: Build epistemos-core (UniFFI dylib)
        run: cd epistemos-core && cargo build --target aarch64-apple-darwin --release

      - name: Build omega-ax (UniFFI static lib)
        run: cd omega-ax && cargo build --target aarch64-apple-darwin --release

      - name: Build omega-mcp (UniFFI dylib)
        run: cd omega-mcp && cargo build --target aarch64-apple-darwin --release

      - name: Build agent_core (UniFFI dylib)
        run: cd agent_core && cargo build --target aarch64-apple-darwin --release

      # Rust tests
      - name: Test graph-engine
        run: cd graph-engine && cargo test --target aarch64-apple-darwin

      - name: Test epistemos-core
        run: cd epistemos-core && cargo test --target aarch64-apple-darwin

      - name: Test omega-ax
        run: cd omega-ax && cargo test --target aarch64-apple-darwin

      - name: Test omega-mcp
        run: cd omega-mcp && cargo test --target aarch64-apple-darwin

      - name: Test agent_core
        run: cd agent_core && cargo test --target aarch64-apple-darwin

      # Rust lints
      - name: Clippy (all crates)
        run: |
          for crate in graph-engine epistemos-core omega-ax omega-mcp agent_core; do
            echo "::group::Clippy $crate"
            cd "$crate"
            cargo clippy --target aarch64-apple-darwin -- -D warnings
            cd ..
            echo "::endgroup::"
          done

      - name: Check Rust formatting
        run: |
          for crate in graph-engine epistemos-core omega-ax omega-mcp agent_core; do
            cd "$crate" && cargo fmt --check && cd ..
          done

      # Generate Xcode project and build Swift
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate UniFFI bindings
        run: |
          bash build-epistemos-core.sh
          bash build-omega-ax.sh
          bash build-omega-mcp.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          ./scripts/xcodebuild_epistemos.sh -resolvePackageDependencies \
            -project Epistemos.xcodeproj \
            -scheme Epistemos \
            -clonedSourcePackagesDirPath .spm-cache
        timeout-minutes: 10

      - name: Build Epistemos Tests
        run: |
          ./scripts/xcodebuild_epistemos.sh build-for-testing \
            -project Epistemos.xcodeproj \
            -scheme Epistemos \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath .derived-data-ci \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Swift tests
        run: |
          ./scripts/xcodebuild_epistemos.sh test-without-building \
            -project Epistemos.xcodeproj \
            -scheme Epistemos \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath .derived-data-ci \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

      # Patch 9: Build the App Store variant (build-only, no tests) so we can
      # measure the produced .app bundle size. Tests for this variant are not
      # run here to keep the job under the 5-minute budget called out in the
      # patch spec; the default Epistemos scheme above already covers test
      # coverage.
      - name: Build Epistemos-AppStore (bundle-size gate)
        run: |
          ./scripts/xcodebuild_epistemos.sh build \
            -project Epistemos.xcodeproj \
            -scheme Epistemos-AppStore \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath .derived-data-ci-appstore \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO

      # Patch 9: Measure the App Store .app bundle. Emits a warning annotation
      # at 80% of the configured limit and fails the job above the limit.
      - name: Check Epistemos-AppStore bundle size
        run: |
          set -euo pipefail
          limit_mb="${EPISTEMOS_APPSTORE_BUNDLE_SIZE_LIMIT_MB}"
          # Locate the produced .app under the App Store DerivedData root.
          # PRODUCT_NAME for Epistemos-AppStore target is "Epistemos" so the
          # bundle on disk is Epistemos.app, not Epistemos-AppStore.app.
          app_path=$(find .derived-data-ci-appstore/Build/Products -type d -name "Epistemos.app" -path "*Release*" -print -quit || true)
          if [ -z "${app_path}" ]; then
            app_path=$(find .derived-data-ci-appstore/Build/Products -type d -name "Epistemos.app" -print -quit || true)
          fi
          if [ -z "${app_path}" ]; then
            echo "::error::Patch 9 bundle-size gate could not locate Epistemos.app under .derived-data-ci-appstore/Build/Products"
            exit 1
          fi
          size_mb=$(du -sm "${app_path}" | awk '{print $1}')
          warn_mb=$(awk -v lim="${limit_mb}" 'BEGIN{printf "%d", lim * 0.8}')
          echo "Epistemos-AppStore bundle: ${app_path}"
          echo "Measured size: ${size_mb} MB (limit ${limit_mb} MB, warn at ${warn_mb} MB)"
          if [ "${size_mb}" -gt "${limit_mb}" ]; then
            echo "::error title=App Store bundle exceeds size limit::Epistemos.app is ${size_mb} MB which exceeds the ${limit_mb} MB ceiling (env EPISTEMOS_APPSTORE_BUNDLE_SIZE_LIMIT_MB)."
            exit 1
          elif [ "${size_mb}" -gt "${warn_mb}" ]; then
            echo "::warning title=App Store bundle approaching size limit::Epistemos.app is ${size_mb} MB which is above the ${warn_mb} MB early-warning band (limit ${limit_mb} MB)."
          fi

      # Wave 2.6: build + run bench/morning-session to produce
      # build/perf-budgets-runtime.json. Must run BEFORE the
      # check-perf-budgets step below so [runtime] budgets get measured
      # data instead of the "no measurement yet" graceful skip.
      - name: Run morning-session bench (Wave 2.6)
        run: ./scripts/run-morning-session.sh

      # Wave 2.5: parse docs/perf-budgets.toml and enforce every measurable
      # budget. Runs after every Rust crate has been built --release above
      # (binary budgets need the dylibs on disk) and after the morning-session
      # bench has written runtime measurements.
      - name: Check perf budgets (docs/perf-budgets.toml)
        run: ./scripts/check-perf-budgets.sh

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-
