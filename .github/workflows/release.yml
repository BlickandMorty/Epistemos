name: Release

# IMPORTANT: This workflow ONLY runs on version tags matching v[0-9]*.
# It will NOT trigger on branch pushes, run-*/feature branches, or PRs.
# If you see noisy "workflow file issue" failures on dev branches,
# the per-job `if:` guard below catches them and exits cleanly without
# burning CI minutes or creating false "failure" emails.

on:
  push:
    tags:
      - 'v[0-9]*'  # Numeric-version tags only (v1.0.0, v2.1.3-beta, etc.)
                   # Excludes checkpoint/dev tags like v-wave-9-base

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    # Defensive guard: only proceed if ref is actually a tag.
    # If somehow this triggers on a branch (GitHub Actions quirk),
    # the job exits cleanly (success) instead of failing noisily.
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            graph-engine -> target
            epistemos-core -> target
            omega-ax -> target
            omega-mcp -> target
            agent_core -> target

      - name: Build all Rust crates (release)
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            for crate in graph-engine epistemos-core omega-ax omega-mcp agent_core; do
              cd "$crate"
              cargo build --target "$target" --release
              cd ..
            done
          done

      - name: Generate UniFFI Swift bindings
        run: |
          bash build-epistemos-core.sh
          bash build-omega-ax.sh
          bash build-omega-mcp.sh
          bash build-agent-core.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          ./scripts/xcodebuild_epistemos.sh -resolvePackageDependencies \
            -project Epistemos.xcodeproj \
            -scheme Epistemos \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build release app bundle
        run: |
          ./scripts/xcodebuild_epistemos.sh archive \
            -project Epistemos.xcodeproj \
            -scheme Epistemos \
            -destination "platform=macOS,arch=arm64" \
            -archivePath build/Epistemos.xcarchive \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Extract .app from archive
        run: cp -R build/Epistemos.xcarchive/Products/Applications/Epistemos.app build/

      - name: Codesign App
        if: ${{ secrets.DEVELOPER_ID_APPLICATION != '' }}
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --deep --force --options runtime \
            --sign "$DEVELOPER_ID_APPLICATION" \
            --entitlements Epistemos/Epistemos.entitlements \
            build/Epistemos.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Epistemos" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Epistemos.app" 175 190 \
            --app-drop-link 425 190 \
            "build/Epistemos-${{ github.ref_name }}.dmg" \
            "build/Epistemos.app"

      - name: Notarize DMG
        if: ${{ secrets.APPLE_ID != '' && secrets.NOTARIZATION_PASSWORD != '' && secrets.TEAM_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool submit "build/Epistemos-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Staple Notarization Ticket
        if: ${{ secrets.APPLE_ID != '' && secrets.NOTARIZATION_PASSWORD != '' && secrets.TEAM_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          xcrun stapler staple "build/Epistemos-${{ github.ref_name }}.dmg"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
          files: build/Epistemos-${{ github.ref_name }}.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
