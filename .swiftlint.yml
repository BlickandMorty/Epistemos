included:
  - Epistemos
  - EpistemosTests

excluded:
  - graph-engine
  - epistemos-core
  - omega-ax
  - omega-mcp
  - agent_core
  - target
  - build
  - .build
  - .spm-cache
  - "**/*Generated*"
  - "**/*UniFFI*"
  - DerivedData
  - Pods
  - build-rust

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - modifier_order
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - yoda_condition

disabled_rules:
  - todo
  - opening_brace
  - trailing_comma
  - type_name
  - identifier_name
  - large_tuple
  - nesting
  - function_body_length

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 800

function_parameter_count:
  warning: 6
  error: 9

cyclomatic_complexity:
  warning: 15
  error: 25

reporter: "xcode"
