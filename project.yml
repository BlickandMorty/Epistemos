name: Epistemos
options:
  bundleIdPrefix: com.epistemos
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SUPPORTED_PLATFORMS: macosx
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
  configs:
    Debug:
      ENABLE_TESTABILITY: true
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_OPTIMIZATION_LEVEL: "0"
      SWIFT_COMPILATION_MODE: "singlefile"
      # Wave 5 follow-up: EPISTEMOS_LINK_SUBSTRATE_RT enables the
      # RustEventRingClient at compile time. The host links libsubstrate_rt.a
      # via OTHER_LDFLAGS below. With the flag off the file compiles to
      # nothing and the host falls back to InMemoryEventRingClient.
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG EPISTEMOS_LINK_SUBSTRATE_RT"
      ONLY_ACTIVE_ARCH: true
      ENABLE_PREVIEWS: true
      DEBUG_INFORMATION_FORMAT: "dwarf"
      GCC_GENERATE_DEBUGGING_SYMBOLS: true
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-Osize"
      DEAD_CODE_STRIPPING: true
      LLVM_LTO: "YES"
      STRIP_INSTALLED_PRODUCT: true
      STRIP_SWIFT_SYMBOLS: true
      DEPLOYMENT_POSTPROCESSING: true
      GCC_OPTIMIZATION_LEVEL: "s"
      COPY_PHASE_STRIP: true

targets:
  Epistemos:
    type: application
    platform: macOS
    sources:
      - path: Epistemos
        type: syncedFolder
        excludes:
          - Engine/ClaudeManagedRuntime.swift
          - Engine/LocalRustRuntime.swift
          - KnowledgeFusion/Alignment/scripts/**
          - KnowledgeFusion/MOHAWK/**
          - KnowledgeFusion/MoLoRA/__pycache__/**
          - KnowledgeFusion/MoLoRA/molora_inference.py
          - KnowledgeFusion/MoLoRA/sgmm_kernel.py
          - KnowledgeFusion/MoLoRA/tests/**
          - KnowledgeFusion/MoLoRA/train_router.py
          - KnowledgeFusion/Training/scripts/**
          - Omega/Knowledge/ODIATraceGenerator.swift
          - Omega/Knowledge/TraceDataMixer.swift
          - Vault/KnowledgeGraphService.swift
      - path: build-rust/swift-bindings
        type: syncedFolder
        includes:
          - "*.swift"
    resources:
      - path: Epistemos/Resources
      - path: Epistemos/Resources/PrivacyInfo.xcprivacy
      - path: config/model_manifest.json
    settings:
      base:
        PRODUCT_NAME: Epistemos
        PRODUCT_BUNDLE_IDENTIFIER: com.epistemos.app
        INFOPLIST_FILE: Epistemos-Info.plist
        GENERATE_INFOPLIST_FILE: false
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        SWIFT_OBJC_BRIDGING_HEADER: Epistemos-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path"
          - "@executable_path/../Frameworks"
          - "@loader_path/../Frameworks"
        OTHER_LDFLAGS: -L$(PROJECT_DIR)/build-rust -lgraph_engine -lsyntax_core -lomega_mcp -lomega_ax -lepistemos_core -lagent_core -lepistemos_shadow -lepistemos_code_index -lsubstrate_rt
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/build-rust/swift-bindings/omega_mcpFFI $(PROJECT_DIR)/build-rust/swift-bindings/omega_axFFI $(PROJECT_DIR)/build-rust/swift-bindings/epistemos_coreFFI $(PROJECT_DIR)/build-rust/swift-bindings/agent_coreFFI
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_ENTITLEMENTS: Epistemos/Epistemos-Debug.entitlements
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: AL562BVF23
          CODE_SIGN_ENTITLEMENTS: Epistemos/Epistemos.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
          ENABLE_HARDENED_RUNTIME: true
    preBuildScripts:
      - name: Build Rust Engine
        script: "bash \"${SRCROOT}/build-rust.sh\" && bash \"${SRCROOT}/build-syntax-core.sh\" && bash \"${SRCROOT}/build-omega-mcp.sh\" && bash \"${SRCROOT}/build-omega-ax.sh\" && bash \"${SRCROOT}/build-epistemos-core.sh\" && bash \"${SRCROOT}/build-agent-core.sh\" && bash \"${SRCROOT}/build-epistemos-shadow.sh\" && bash \"${SRCROOT}/build-epistemos-code-index.sh\" && bash \"${SRCROOT}/build-substrate-rt.sh\" && bash \"${SRCROOT}/build-tiptap-bundle.sh\""
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Bundle Runtime Assets
        script: bash "${SRCROOT}/bundle-app-runtime-assets.sh"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: AXorcist
      - package: GRDB
      - package: Grape
      - package: HuggingFace
      - package: MLX
        product: MLX
      - package: MLX-LM
        product: MLXLMCommon
      - package: MLX-LM
        product: MLXLLM
      - package: MLX-LM
        product: MLXVLM
      - package: GGUFRuntimeBridge
        product: GGUFRuntimeBridge
      - package: CodeEditSourceEditor
      - package: SwiftTreeSitter
      - package: CodeEditLanguages
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: Foundation.framework
      - sdk: CryptoKit.framework
      - sdk: Network.framework
      - sdk: AppIntents.framework
      - sdk: CoreSpotlight.framework

  Epistemos-AppStore:
    type: application
    platform: macOS
    sources:
      - path: Epistemos
        type: syncedFolder
        excludes:
          - Engine/ClaudeManagedRuntime.swift
          - Engine/LocalRustRuntime.swift
          - KnowledgeFusion/Alignment/scripts/**
          - KnowledgeFusion/MOHAWK/**
          - KnowledgeFusion/MoLoRA/__pycache__/**
          - KnowledgeFusion/MoLoRA/molora_inference.py
          - KnowledgeFusion/MoLoRA/sgmm_kernel.py
          - KnowledgeFusion/MoLoRA/tests/**
          - KnowledgeFusion/MoLoRA/train_router.py
          - KnowledgeFusion/Training/scripts/**
          - Omega/Knowledge/ODIATraceGenerator.swift
          - Omega/Knowledge/TraceDataMixer.swift
          - Vault/KnowledgeGraphService.swift
      - path: build-rust/swift-bindings
        type: syncedFolder
        includes:
          - "*.swift"
        excludes:
          - omega_ax.swift
    resources:
      - path: Epistemos/Resources
      - path: Epistemos/Resources/PrivacyInfo.xcprivacy
      - path: config/model_manifest.json
    settings:
      base:
        PRODUCT_NAME: Epistemos
        PRODUCT_BUNDLE_IDENTIFIER: com.epistemos.appstore
        INFOPLIST_FILE: Epistemos-AppStore-Info.plist
        GENERATE_INFOPLIST_FILE: false
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Epistemos/Epistemos-AppStore.entitlements
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        SWIFT_OBJC_BRIDGING_HEADER: Epistemos-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path"
          - "@executable_path/../Frameworks"
          - "@loader_path/../Frameworks"
        OTHER_LDFLAGS: -L$(PROJECT_DIR)/build-rust -lgraph_engine -lsyntax_core -lomega_mcp -lepistemos_core -lagent_core -lepistemos_shadow -lepistemos_code_index -lsubstrate_rt
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/build-rust/swift-bindings/omega_mcpFFI $(PROJECT_DIR)/build-rust/swift-bindings/epistemos_coreFFI $(PROJECT_DIR)/build-rust/swift-bindings/agent_coreFFI
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG EPISTEMOS_APP_STORE MAS_SANDBOX EPISTEMOS_LINK_SUBSTRATE_RT"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: AL562BVF23
          ENABLE_HARDENED_RUNTIME: true
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) EPISTEMOS_APP_STORE MAS_SANDBOX EPISTEMOS_LINK_SUBSTRATE_RT"
    preBuildScripts:
      - name: Build Rust Engine
        script: "bash \"${SRCROOT}/build-rust.sh\" && bash \"${SRCROOT}/build-syntax-core.sh\" && MAS_SANDBOX=1 bash \"${SRCROOT}/build-omega-mcp.sh\" && bash \"${SRCROOT}/build-epistemos-core.sh\" && bash \"${SRCROOT}/build-agent-core.sh\" && bash \"${SRCROOT}/build-epistemos-shadow.sh\" && bash \"${SRCROOT}/build-epistemos-code-index.sh\" && bash \"${SRCROOT}/build-substrate-rt.sh\" && bash \"${SRCROOT}/build-tiptap-bundle.sh\""
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Bundle Runtime Assets
        script: bash "${SRCROOT}/bundle-app-runtime-assets.sh"
        basedOnDependencyAnalysis: false
      - name: Scrub Pro Frameworks
        script: |
          set -euo pipefail
          frameworks_dir="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          rm -f "${frameworks_dir}/libomega_ax.dylib"
          rm -rf "${frameworks_dir}/AXorcist.framework"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: GRDB
      - package: Grape
      - package: HuggingFace
      - package: MLX
        product: MLX
      - package: MLX-LM
        product: MLXLMCommon
      - package: MLX-LM
        product: MLXLLM
      - package: MLX-LM
        product: MLXVLM
      - package: GGUFRuntimeBridge
        product: GGUFRuntimeBridge
      - package: CodeEditSourceEditor
      - package: SwiftTreeSitter
      - package: CodeEditLanguages
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: Foundation.framework
      - sdk: CryptoKit.framework
      - sdk: Network.framework
      - sdk: AppIntents.framework
      - sdk: CoreSpotlight.framework

  EpistemosTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EpistemosTests
        type: syncedFolder
    dependencies:
      - target: Epistemos
    preBuildScripts:
      - name: Bundle Test Source Mirror
        script: |
          set -euo pipefail
          output_dir="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/SourceMirror"
          mkdir -p "${output_dir}"

          prune_artifact_directories() {
            local destination_root="$1"

            if [ ! -d "${destination_root}" ]; then
              return 0
            fi

            find "${destination_root}" -type d \( \
              -name 'target' -o \
              -name '.build' -o \
              -name 'build' -o \
              -name 'DerivedData' -o \
              -name '.git' -o \
              -name 'node_modules' -o \
              -name '.venv' -o \
              -name 'venv' -o \
              -name '__pycache__' \
            \) -prune -exec rm -rf {} +
          }

          copy_tree() {
            local relative_root="$1"
            local source_root="${PROJECT_DIR}/${relative_root}"
            local destination_root="${output_dir}/${relative_root}"

            if [ ! -d "${source_root}" ]; then
              rm -rf "${destination_root}"
              return 0
            fi

            mkdir -p "${destination_root}"
            prune_artifact_directories "${destination_root}"
            rsync -a --delete --prune-empty-dirs \
              --exclude='target/' \
              --exclude='.build/' \
              --exclude='build/' \
              --exclude='DerivedData/' \
              --exclude='.git/' \
              --exclude='node_modules/' \
              --exclude='.venv/' \
              --exclude='venv/' \
              --exclude='__pycache__/' \
              --include='*/' \
              --include='*.swift' \
              --include='*.rs' \
              --include='*.py' \
              --include='*.sh' \
              --include='*.yml' \
              --include='*.yaml' \
              --include='*.toml' \
              --include='*.h' \
              --include='*.pbxproj' \
              --include='*.plist' \
              --include='*.md' \
              --include='*.json' \
              --include='*.jsonl' \
              --include='*.png' \
              --include='*.metal' \
              --include='*.xcprivacy' \
              --include='*.entitlements' \
              --include='*.udl' \
              --include='*.xcscheme' \
              --include='*.xcworkspacedata' \
              --exclude='*' \
              "${source_root}/" "${destination_root}/"
          }

          copy_file() {
            local relative_path="$1"
            local source_path="${PROJECT_DIR}/${relative_path}"
            local destination_path="${output_dir}/${relative_path}"

            if [ ! -f "${source_path}" ]; then
              rm -f "${destination_path}"
              return 0
            fi

            mkdir -p "$(dirname "${destination_path}")"
            rsync -a "${source_path}" "${destination_path}"
          }

          copy_tree "Epistemos"
          copy_tree "EpistemosTests"
          copy_tree "agent_core"
          copy_tree "graph-engine"
          copy_tree "graph-engine-bridge"
          copy_tree "epistemos-core"
          copy_tree "syntax-core"
          copy_tree "syntax-core-bridge"
          copy_tree "scripts"
          copy_tree "docs"
          copy_tree ".agents"
          copy_tree ".github"
          copy_tree "config"
          copy_tree "LocalPackages"
          copy_tree "Epistemos.xcodeproj"

          copy_file "AGENTS.md"
          copy_file "CLAUDE.md"
          copy_file "Epistemos-Bridging-Header.h"
          copy_file "Epistemos-Info.plist"
          copy_file "Epistemos-AppStore-Info.plist"
          copy_file "project.yml"
          copy_file "Makefile"
          copy_file "TESTING_GUIDE.md"
          copy_file "patch-uniffi-bindings.py"
          copy_file "bundle-app-runtime-assets.sh"
          copy_file "embed-and-sign-rust-dylib.sh"
          copy_file "build-rust.sh"
          copy_file "build-syntax-core.sh"
          copy_file "build-omega-mcp.sh"
          copy_file "build-omega-ax.sh"
          copy_file "build-epistemos-core.sh"
          copy_file "build-agent-core.sh"
          copy_file "build-epistemos-shadow.sh"
          copy_file "build-epistemos-code-index.sh"
          copy_file "build-substrate-rt.sh"
          copy_file "build-tiptap-bundle.sh"
        basedOnDependencyAnalysis: false
      - name: Bundle Adapter Audit Sources
        script: |
          set -euo pipefail
          output_dir="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/AdapterAudit"
          mkdir -p "${output_dir}"
          cp "${PROJECT_DIR}/Epistemos/KnowledgeFusion/Adapters/AdapterExporter.swift" "${output_dir}/AdapterExporter.swift.txt"
          cp "${PROJECT_DIR}/Epistemos/KnowledgeFusion/Adapters/AdapterLoader.swift" "${output_dir}/AdapterLoader.swift.txt"
          cp "${PROJECT_DIR}/Epistemos/KnowledgeFusion/Adapters/AdapterRegistry.swift" "${output_dir}/AdapterRegistry.swift.txt"
          cp "${PROJECT_DIR}/Epistemos/KnowledgeFusion/Adapters/AdapterRouter.swift" "${output_dir}/AdapterRouter.swift.txt"
          cp "${PROJECT_DIR}/Epistemos/KnowledgeFusion/Adapters/MoLoRARouter.swift" "${output_dir}/MoLoRARouter.swift.txt"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_NAME: EpistemosTests
        PRODUCT_MODULE_NAME: EpistemosTests
        PRODUCT_BUNDLE_IDENTIFIER: com.epistemos.tests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ALWAYS_SEARCH_USER_PATHS: false
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_OBJC_BRIDGING_HEADER: Epistemos-Bridging-Header.h
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/build-rust/swift-bindings/omega_mcpFFI $(PROJECT_DIR)/build-rust/swift-bindings/omega_axFFI $(PROJECT_DIR)/build-rust/swift-bindings/epistemos_coreFFI $(PROJECT_DIR)/build-rust/swift-bindings/agent_coreFFI
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Epistemos.app/Contents/MacOS/Epistemos"

packages:
  AXorcist:
    url: https://github.com/steipete/AXorcist.git
    from: "0.1.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    version: 7.10.0
  Grape:
    url: https://github.com/SwiftGraphs/Grape
    from: 1.1.0
  HuggingFace:
    url: https://github.com/huggingface/swift-huggingface.git
    version: 0.9.0
  MLX:
    url: https://github.com/ml-explore/mlx-swift
    revision: 6ba4827fb82c97d012eec9ab4b2de21f85c3b33d
  MLX-LM:
    path: LocalPackages/mlx-swift-lm
  GGUFRuntimeBridge:
    path: LocalPackages/GGUFRuntimeBridge
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    from: "0.15.2"
  # Wave 9.6 follow-up — SwiftTreeSitter + CodeEditLanguages must be
  # DIRECT package deps (not just transitive through CodeEditSourceEditor)
  # so SwiftTreeSitterLiveHighlighter.swift can `import SwiftTreeSitter`
  # + `import CodeEditLanguages`. Without these, transitive symbols
  # (Language, CodeLanguage) compile-resolve to "no member" because
  # SPM only exposes directly-declared package products to the importing
  # target.
  SwiftTreeSitter:
    url: https://github.com/ChimeHQ/SwiftTreeSitter.git
    from: "0.25.0"
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    from: "0.1.20"

schemes:
  Epistemos:
    build:
      preActions:
        - name: Patch MLX Metal Warning
          script: bash "${SRCROOT}/scripts/patch_mlx_metal_warnings.sh"
          settingsTarget: Epistemos
      targets:
        Epistemos: all
    test:
      targets:
        - EpistemosTests
    run:
      executable: Epistemos
    archive:
      config: Release
  Epistemos-AppStore:
    build:
      preActions:
        - name: Patch MLX Metal Warning
          script: bash "${SRCROOT}/scripts/patch_mlx_metal_warnings.sh"
          settingsTarget: Epistemos-AppStore
      targets:
        Epistemos-AppStore: all
    run:
      executable: Epistemos-AppStore
    archive:
      config: Release
