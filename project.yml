name: Epistemos
options:
  bundleIdPrefix: com.epistemos
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SUPPORTED_PLATFORMS: macosx
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
  configs:
    Debug:
      ENABLE_TESTABILITY: true

targets:
  Epistemos:
    type: application
    platform: macOS
    sources:
      - path: Epistemos
        excludes:
          - KnowledgeFusion/MOHAWK/**
          - Omega/Knowledge/ODIATraceGenerator.swift
          - Omega/Knowledge/TraceDataMixer.swift
      - path: build-rust/swift-bindings/omega_mcp.swift
      - path: build-rust/swift-bindings/omega_ax.swift
      - path: build-rust/swift-bindings/epistemos_core.swift
    resources:
      - path: Epistemos/Resources
      - path: Epistemos/Resources/PrivacyInfo.xcprivacy
      - path: config/model_manifest.json
      - path: hermes-agent/requirements.txt
    settings:
      base:
        PRODUCT_NAME: Epistemos
        PRODUCT_BUNDLE_IDENTIFIER: com.epistemos.app
        INFOPLIST_FILE: Epistemos-Info.plist
        GENERATE_INFOPLIST_FILE: false
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        SWIFT_OBJC_BRIDGING_HEADER: Epistemos-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path"
          - "@executable_path/../Frameworks"
          - "@loader_path/../Frameworks"
        OTHER_LDFLAGS: -L$(PROJECT_DIR)/build-rust -lgraph_engine -lomega_mcp -lomega_ax -lepistemos_core
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/build-rust/swift-bindings/omega_mcpFFI $(PROJECT_DIR)/build-rust/swift-bindings/omega_axFFI $(PROJECT_DIR)/build-rust/swift-bindings/epistemos_coreFFI
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_ENTITLEMENTS: Epistemos/Epistemos-Debug.entitlements
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: AL562BVF23
          CODE_SIGN_ENTITLEMENTS: Epistemos/Epistemos.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
          ENABLE_HARDENED_RUNTIME: true
    preBuildScripts:
      - name: Build Rust Engine
        script: bash "${SRCROOT}/build-rust.sh" && bash "${SRCROOT}/build-omega-mcp.sh" && bash "${SRCROOT}/build-omega-ax.sh" && bash "${SRCROOT}/build-epistemos-core.sh"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Bundle Runtime Assets
        script: bash "${SRCROOT}/bundle-app-runtime-assets.sh"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: AXorcist
      - package: GRDB
      - package: Grape
      - package: HuggingFace
      - package: MLX
        product: MLX
      - package: MLX-LM
        product: MLXLMCommon
      - package: MLX-LM
        product: MLXLLM
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: Foundation.framework
      - sdk: CryptoKit.framework
      - sdk: Network.framework
      - sdk: AppIntents.framework
      - sdk: CoreSpotlight.framework

  EpistemosTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EpistemosTests
    dependencies:
      - target: Epistemos
    settings:
      base:
        PRODUCT_NAME: EpistemosTests
        PRODUCT_MODULE_NAME: EpistemosTests
        PRODUCT_BUNDLE_IDENTIFIER: com.epistemos.tests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ALWAYS_SEARCH_USER_PATHS: false
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Epistemos.app/Contents/MacOS/Epistemos"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_OBJC_BRIDGING_HEADER: Epistemos-Bridging-Header.h
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/build-rust/swift-bindings/omega_mcpFFI $(PROJECT_DIR)/build-rust/swift-bindings/omega_axFFI $(PROJECT_DIR)/build-rust/swift-bindings/epistemos_coreFFI

packages:
  AXorcist:
    url: https://github.com/steipete/AXorcist.git
    from: "0.1.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    version: 7.10.0
  Grape:
    url: https://github.com/SwiftGraphs/Grape
    from: 1.1.0
  HuggingFace:
    url: https://github.com/huggingface/swift-huggingface.git
    version: 0.9.0
  MLX:
    url: https://github.com/ml-explore/mlx-swift
    revision: 6ba4827fb82c97d012eec9ab4b2de21f85c3b33d
  MLX-LM:
    url: https://github.com/ml-explore/mlx-swift-lm
    revision: bc3c20ef4644c86f2b347debcfe1efe4308712a6

schemes:
  Epistemos:
    build:
      targets:
        Epistemos: all
    test:
      targets:
        - EpistemosTests
    run:
      executable: Epistemos
