[package]
name = "agent_core"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "agent_core"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
anyhow = "1.0"
async-stream = "0.3"
async-trait = "0.1"
chrono = { version = "0.4", features = ["clock", "serde"] }
eventsource-stream = "0.2"
futures = "0.3"
git2 = "0.19"
libc = "0.2"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
similar = "2"
tantivy = "0.22"
thiserror = "1.0"
nix = { version = "0.29", features = ["process", "term", "signal", "fs"] }
tokio = { version = "1.43", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
memchr = "2.7"
memmap2 = "0.9"
rayon = "1.10"
tracing = "0.1"
uniffi = { version = "0.28", features = ["tokio"] }
walkdir = "2.5"
uuid = { version = "1.11", features = ["serde", "v4"] }
tempfile = "3.14"
which = "7"
dirs = "6"

[profile.release]
# SAFETY: agent_core MUST use "unwind" so catch_unwind can intercept panics
# and return typed AgentErrorFFI to Swift instead of aborting the process.
panic = "unwind"
# Binary size optimizations — target: 8-12MB stripped
opt-level = "z"        # Optimize for size (smallest binary)
lto = true             # Link-time optimization across all crates
codegen-units = 1      # Single codegen unit for maximum LTO effectiveness
strip = "symbols"      # Strip debug symbols from release binary

[build-dependencies]
uniffi = { version = "0.28", features = ["build"] }
