[package]
name = "graph-engine"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
metal = "0.31"
objc = "0.2"
parking_lot = "0.12"
rustc-hash = "2.1"
png = "0.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pulldown-cmark = { version = "0.12", default-features = false }
fst = { version = "0.4", features = ["levenshtein"] }

[profile.release]
opt-level = 3
lto = "thin"
